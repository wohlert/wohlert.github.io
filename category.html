---
layout: default
permalink: /category/
title: Categories
---
<div id="presentation" style="background:none;">
  <!-- Content -->
  <main role="main">
    <h1>All categories</h1>
    <ul style="list-style-type: none; margin: 32px 0">
    {% for category in site.categories %}
        <li style="display: inline; padding: 10px;"><a href="{{ site.url }}/category/{{ category | first | slugify }}/">{{ category | first }}</a></li>
    {% endfor %}
    </ul>
  </main>
</div>
