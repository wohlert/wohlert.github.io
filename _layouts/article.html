<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="{{ page.description | default: site.description | smartify }}">
    <meta name="author" content="Jesper Wohlert">
    <meta name="generator" content="Jekyll v{{ jekyll.version }}">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="HandheldFriendly" content="True" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ site.title }} | {{ page.title }}</title>
    <link rel="stylesheet" href="{{ 'assets/scss/style.css' | relative_url }}"/>
    <link href="{{ 'assets/favicon.ico' | relative_url }} " rel="shortcut icon">
  </head>
  <body class="post-template">
    {% include header.html %}
    <main id="main" class="post">
      <article class="content post">
        <header class="meta">
          <h1 class="post-title">{{ page.title }}</h1>
          <span class="post-data">
              <time class="date" itemprop="datePublished" datetime="{{ site.time | date_to_xmlschema }}" title="{{ site.time | date_to_string }}">Published on {{ site.time | date_to_string }}
              </time>
              <section class="byline" style="display:none;"> <span itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span itemprop="name" rel="author">Jesper Wohlert</span></span>
              </section>
          </span>
        </header>
        <section itemprop="articleBody text" class="post-content">
            {{ content }}
        </section>
      </article>
    </main>
  </body>
  {% include postfooter.html %}
</html>
