<!DOCTYPE html>
<html>
  {% include head.html %}
  <body class="post-template">
    {% include header.html %}
    <main id="main" class="post">
      <article class="content post">
        <header class="meta">

          <h1 class="post-title">{{ page.title }}</h1>
          <div class="description">
          <!--
            <span class="heading">
              <span style="font-weight: 800">Abstract</span>
              <p>
                  {{ page.description }}
              </p>
            </span>
          -->
            <span class="meta-data heading">
                <section class="byline" style="display:none;">
                  <span itemprop="author" itemscope="" itemtype="http://schema.org/Person">
                    <span itemprop="name" rel="author">Jesper Wohlert</span>
                  </span>
                </section>
                <time class="date" itemprop="datePublished" datetime="{{ page.date | date_to_xmlschema }}" title="{{ page.date | date_to_string }}">Published on {{ page.date | date_to_string }}
                </time>
                &nbsp; in
                {% for category in page.categories %}
                  <li>#<a href="{{site.url}}/category/{{category|slugize}}">{{category}}</a></li>
                {% endfor %}
            </span>
          </div>
        </header>
        <div style="width: 100%; height: 400px;
        background: url({{page.image}});
        background-repeat: no-repeat;"></div>
        <section itemprop="articleBody text" class="post-content">
            {{ content }}
        </section>
      </article>
    </main>
    {% include postfooter.html %}
  </body>
</html>
