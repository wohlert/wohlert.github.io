<div id="header">
  <h3>
    <a href="{{ site.url }}" style="text-decoration: none;">{{ site.title | downcase }}</a>
  </h3>
  <nav class="links">
    <ul>
        <li><a title="Posts" href="{{ 'posts' | relative_url }}">
          <span>posts</span></a>
          <!-- <i class="fa fa-list"></i></a> -->
        </li>
        <li><a title="About" href="{{ 'about' | relative_url }}">
            <span>about</span></a>
          </li>
        <li class="external">
        <a title="Github" href="https://github.com/wohlert" target="_blank">
          <svg class="icon" height="15px" width="15px">
            <use xlink:href="{{ '/assets/images/github-alt.svg#icon' | relative_url }}"></use>
          </svg>
        </a>
        </li>
        <li class="external">
        <a title="Atom feed" href="{{ 'feed.xml' | relative_url }}">
          <svg class="icon rss" height="15px" width="15px">
            <use xlink:href="{{ '/assets/images/rss-square.svg#icon' | relative_url }}"></use>
          </svg>
        </a>
        </li>
    </ul>
  </nav>
</div>
