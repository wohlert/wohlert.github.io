---
layout: default
---
<div id="presentation">
  <p class="description">Latest articles</p>
  <!-- Content -->
  <main class="index" role="main">
    {% for post in site.posts limit:3 %}	
      <article itemprop="blogPost" itemscope itemtype="http://schema.org/BlogPosting" class="post">
        <header class="meta">
          <h1 class="post-title" itemprop="name headline"><a href="{{ post.url }}"  itemprop="url">{{ post.title }}</a></h1>
          <span class="post-data">
            <time
            class="timesince date"
            itemprop="datePublished"
            datetime="{{ post.date | date: 'YYYY-MM-DDTHH:mm'}}"
            title="{{ post.date | date: 'D MMM YYYY'}}"
            data-timesince="{{ post.date | date: 'X'}}">
            {{ post.date | date: "%B %e, %Y" }}
            </time>
          </span>
        <div class="post-content-short">{{ post.description }}</div>
        </header>
      </article>
    {% endfor %}
  </main>
</div>
