<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="HandheldFriendly" content="True" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    Wohlert.nu
  </title>
  <meta name="description" content="{{meta_description}}" />

  <link href="assets/css/style.css" rel="stylesheet" type="text/css">
  <link href="assets/favicon.ico" rel="shortcut icon">
</head>
<body itemscope itemtype="http://schema.org/Blog" class="body">
  <div id="header">
    <h3>wohlert.nu</h3>
    <nav class="links">
      <ul>
        <li><a title="CV" href="/static/cv.pdf"><i class="fa fa-copy"></i></a></li>
        <li><a title="Github" href="https://github.com/wohlert" target="_blank"><i class="fa fa-github"></i></a></li>
      </ul>
    </nav>
  </div>

  <div id="presentation" style="background: url('assets/images/bg.jpg')">
    <h1>wohlert.nu</h1>
    <p class="description"></p>
    <!-- Content -->
    <main class="index" role="main">
      <h1>Latests articles</h1>
      <article itemprop="blogPost" itemscope itemtype="http://schema.org/BlogPosting" class="post">
        <header class="meta">
          <h2 class="post-title" itemprop="name headline"><a href="post.html"  itemprop="url">Something something</a></h2>
          <span class="post-data">
            <time
            class="timesince date"
            itemprop="datePublished"
            datetime="{{date format='YYYY-MM-DDTHH:mm'}}"
            title="{{date format='D MMM YYYY'}}"
            data-timesince="{{date format='X'}}">
            July 15, 2017
          </time>
          <span itemprop="keywords" class="tags">
            Machine learning, cosmos
          </span>
        </span>
        <div class="post-content-short">This is a short description</div>
      </header>
    </article>

    </main>
  </div>

<footer>
  <section class="colophon">
    <section class="copyright">
      Copyright &copy; <span itemprop="copyrightHolder">wohlert.nu</span>. <span rel="license">All Rights Reserved</span>.
    </section>
  </section>
</footer>
<script type="text/javascript" src="{{asset 'js/highlight.pack.js'}}"></script>
<script type="text/javascript" src="{{asset 'js/jquery.fitvids.js'}}"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>
<script type="text/javascript" src="{{asset 'js/scripts.js'}}"></script>
</body>
</html>
